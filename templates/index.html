<!DOCTYPE html>
<html>
<head>
<title>Drug Addiction Predictor using ML</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #1e3c72, #2a5298);
}

.container {
    width: 500px;
    margin: auto;
    background: white;
    padding: 25px;
    margin-top: 40px;
    border-radius: 15px;
}

h1 { text-align: center; color: white; }
.subtitle { text-align: center; color: white; }

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #667eea;
    color: white;
    border-radius: 8px;
}

.bar-container {
    width: 100%;
    background: #ddd;
    border-radius: 20px;
    margin-top: 20px;
    overflow: hidden;
}

.bar {
    height: 40px;
    color: white;
    text-align: center;
    font-weight: bold;
}

.low { background: green; }
.moderate { background: orange; }
.high { background: red; }

ul {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>💊 Drug Addiction Predictor using ML</h1>
<p class="subtitle">⚠️ Educational tool only. Not medical advice.</p>

<div class="container">

<form action="/predict" method="post">

<select name="Age Group" required>
<option disabled selected>Age Group</option>
<option>18-25</option><option>26-35</option>
<option>36-45</option><option>46+</option>
</select>

<select name="Gender" required>
<option disabled selected>Gender</option>
<option>Male</option><option>Female</option>
</select>

<select name="Frequency" required>
<option disabled selected>Smoking</option>
<option>0</option><option>1</option><option>2</option>
<option>3</option><option>4</option><option>5</option>
</select>

<select name="Consumption" required>
<option disabled selected>Alcohol</option>
<option>Never</option><option>Occasional</option>
<option>Weekly</option><option>Daily</option>
</select>

<select name="Use Frequency" required>
<option disabled selected>Drugs</option>
<option>Never</option><option>Rarely</option>
<option>Sometimes</option><option>Often</option>
</select>

<select name="Stress Level" required>
<option disabled selected>Stress</option>
<option>Low</option><option>Moderate</option><option>High</option>
</select>

<select name="Sleep Hours" required>
<option disabled selected>Sleep</option>
<option><5</option><option>5-7</option>
<option>7-9</option><option>>9</option>
</select>

<select name="Physical Activity" required>
<option disabled selected>Physical Activity</option>
<option>Low</option><option>Moderate</option><option>High</option>
</select>

<select name="Related to" required>
<option disabled selected>Peer Pressure</option>
<option>No</option><option>Sometimes</option><option>Yes</option>
</select>

<select name="Use of other Tobacco Products" required>
<option disabled selected>Other Tobacco</option>
<option>No</option><option>Yes</option>
</select>

<button type="submit">Predict</button>

</form>

{% if result %}
<h2 style="text-align:center;">{{ result }}</h2>
<p style="text-align:center;">{{ message }}</p>

<div class="bar-container">
    <div class="bar 
    {% if result == 'Low Risk' %}low{% elif result == 'Moderate Risk' %}moderate{% else %}high{% endif %}"
    style="width: {{ score }}%;">
    {{ score }}%
    </div>
</div>

<h3>📊 Risk Contribution:</h3>
<ul>
{% for item, value in contributions %}
<li><b>{{ item }}</b> → {{ value }}%</li>
{% endfor %}
</ul>

{% endif %}

</div>

</body>
</html>
