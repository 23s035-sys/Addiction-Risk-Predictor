<!DOCTYPE html>
<html>
<head>
<title>Drug Addiction Predictor using ML</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
}

.container {
    width: 500px;
    margin: auto;
    background: white;
    color: black;
    padding: 25px;
    margin-top: 40px;
    border-radius: 15px;
}

h1 {
    text-align: center;
    color: white;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    margin-bottom: 20px;
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.result {
    text-align: center;
    margin-top: 20px;
}

.bar-container {
    width: 100%;
    background: #ddd;
    border-radius: 20px;
    margin-top: 20px;
    overflow: hidden;
}

.bar {
    height: 40px;
    line-height: 40px;
    color: white;
    text-align: center;
    font-weight: bold;
}

.low { background: green; }
.moderate { background: orange; }
.high { background: red; }

.warning {
    margin-top: 20px;
    font-size: 14px;
    color: red;
    text-align: center;
}
</style>
</head>

<body>

<h1>💊 Drug Addiction Predictor using ML</h1>
<p class="subtitle">⚠️ This is only a prediction tool. Not a medical diagnosis.</p>

<div class="container">

<form action="/predict" method="post">

<select name="Frequency" required>
<option disabled selected>Smoking</option>
<option>0</option><option>1</option><option>2</option>
<option>3</option><option>4</option><option>5</option>
</select>

<select name="Consumption" required>
<option disabled selected>Alcohol</option>
<option>Never</option><option>Occasional</option>
<option>Weekly</option><option>Daily</option>
</select>

<select name="Use Frequency" required>
<option disabled selected>Drugs</option>
<option>Never</option><option>Rarely</option>
<option>Sometimes</option><option>Often</option>
</select>

<select name="Stress Level" required>
<option disabled selected>Stress</option>
<option>Low</option><option>Moderate</option><option>High</option>
</select>

<select name="Sleep Hours" required>
<option disabled selected>Sleep</option>
<option><5</option><option>5-7</option>
<option>7-9</option><option>>9</option>
</select>

<select name="Physical Activity" required>
<option disabled selected>Physical Activity</option>
<option>Low</option><option>Moderate</option><option>High</option>
</select>

<button type="submit">Predict</button>

</form>

{% if result %}
<div class="result">

<h2>{{ result }}</h2>
<p>{{ message }}</p>

<div class="bar-container">
    <div class="bar 
        {% if result == 'Low Risk' %}low{% elif result == 'Moderate Risk' %}moderate{% else %}high{% endif %}"
        style="width: {{ score }}%;">
        {{ score }}%
    </div>
</div>

<p>⚠️ Risk influenced by: <b>{{ reasons }}</b></p>

</div>
{% endif %}

<div class="warning">
This tool is for educational purposes only.
</div>

</div>

</body>
</html>
